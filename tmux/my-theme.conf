# Custom Tmux Theme - Gruvbox Material with Powerline Chevrons

BG="#32302F"
FG="#d4be98"
RED="#ea6962"
GREEN="#a9b665"
BLUE="#7daea3"
MAGENTA="#d3869b"
CYAN="#89b482"
BLACK="#1d2021"
DARK_GRAY="#32302F"
LIGHT_GRAY="#4F4946"
YELLOW="#DBBC7f"
SOFT_WHITE="#E7E0C9"

TRIANGLE_CLOSE="#(printf '\ue0b0')"
TRIANGLE_OPEN="#(printf '\ue0b2')"
THIN_RIGHT_SEP="#(printf '\ue0b1')"

# Status bar
set-option -g status "on"
set-option -g status-style bg=$BG,fg=$FG
set-option -g status-interval 1
set-option -g status-justify "left"
set-option -g status-left-length "100"
set-option -g status-right-length "100"

# Pane borders
set-option -g pane-border-style fg=$LIGHT_GRAY
set-option -g pane-active-border-style fg=$YELLOW

# Message styling
set-option -g message-style bg=$BG,fg=$YELLOW
set-option -g message-command-style bg=$BG,fg=$YELLOW

# Pane number display
set-option -g display-panes-active-colour $YELLOW
set-option -g display-panes-colour $BLUE

# Window status styling
set-window-option -g window-status-style bg=$LIGHT_GRAY,fg=$FG
set-window-option -g window-status-current-style bg=$YELLOW,fg=$BLACK
set-window-option -g window-status-activity-style bg=$LIGHT_GRAY,fg=$RED
set-window-option -g window-status-bell-style bg=$RED,fg=$BG

# Status left: session name (no background)
set-option -g status-left "#[bg=default,fg=$SOFT_WHITE]    #S    "

# Status right: current dir
set-option -g status-right "#[bg=default,fg=$SOFT_WHITE] #(~/.config/scripts/tmux-path-two-level '#{pane_current_path}') "

# Custom status layout:
# left -> session + windows, right -> current dir + gitmux
set-option -g status-format[0] "#[bg=$BG]#[align=left]#{E:status-left}#{W:#{E:window-status-format},#{E:window-status-current-format}}#[align=right]#{E:status-right} #(gitmux -cfg ~/.config/tmux/gitmux.conf #{pane_current_path})"

# Inactive window: index > name flag ▶
set-window-option -g window-status-format "#[bg=$LIGHT_GRAY,fg=$FG] #I #[fg=$FG]${THIN_RIGHT_SEP} #W#F #[bg=$BG,fg=$LIGHT_GRAY]${TRIANGLE_CLOSE}"

# Active window: index > name flag ▶
set-window-option -g window-status-current-format "#[bg=$YELLOW,fg=$BLACK] #I #[fg=$DARK_GRAY]${THIN_RIGHT_SEP}#[fg=$BLACK] #W#F #[bg=$BG,fg=$YELLOW]${TRIANGLE_CLOSE}"

# No gap between windows
set-window-option -g window-status-separator ""
